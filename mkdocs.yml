site_name: "vexy-lines-cli"
site_description: "CLI tool and MCP passthrough server for Vexy Lines"
theme:
  custom_dir: overrides
  name: materialx
  features:
    - content.code.copy
    - navigation.sections
  palette:
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/brightness-7
        name: Light mode
    - scheme: default
      primary: indigo
      toggle:
        icon: material/brightness-4
        name: Dark mode
docs_dir: src_docs
site_dir: docs
markdown_extensions:
  - pymdownx.highlight:
      auto_title: false
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
nav:
  - Overview: index.md
  - Installation: installation.md
  - CLI Reference: cli-reference.md
  - Export Pipeline: export-pipeline.md
  - API Reference: api-reference.md
  - Examples: examples.md
  - Changelog: changelog.md
